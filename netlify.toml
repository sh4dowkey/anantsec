[build]
  publish = "."
  command = "echo 'No build command'"

# Content-Security-Policy and site-wide headers
[[headers]]
  for = "/*"
  [headers.values]

    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://badge-anantsec.netlify.app; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unicons.iconscout.com https://badge-anantsec.netlify.app; font-src 'self' https://cdnjs.cloudflare.com https://unicons.iconscout.com https://badge-anantsec.netlify.app; img-src 'self' data: https://sh4dowkey.github.io https://badge-anantsec.netlify.app; connect-src 'self' https://cdnjs.cloudflare.com https://unicons.iconscout.com https://badge-anantsec.netlify.app; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src https://badge-anantsec.netlify.app"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Fallback: everything else -> 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404